<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>單字庫 | Daily English Vocabulary</title>
  <link rel="stylesheet" href="./manage-page.css">
</head>
<body class="manage-page">
  <nav class="topbar" aria-label="單字庫導覽">
    <div class="topbar-inner">
      <a class="brand" href="./index.html">Daily English Vocabulary</a>
      <div class="topbar-links">
        <a href="./index.html">單字庫</a>
        <a href="./backlog.html">陌生字</a>
        <a href="./review.html">複習</a>
      </div>
    </div>
  </nav>

  <header class="page-head">
    <div class="page-head-inner">
      <section>
        <p class="kicker">Library Desk</p>
        <h1>單字庫</h1>
        <p class="page-thesis">搜尋已生成頁面；陌生字先放待補清單。</p>
      </section>

      <section class="stats-grid" aria-label="單字庫統計">
        <article class="stat-item">
          <span>已有單字頁</span>
          <strong id="total-words">0</strong>
        </article>
        <article class="stat-item">
          <span>待補單字</span>
          <strong id="pending-words">0</strong>
        </article>
      </section>
    </div>
  </header>

  <main class="manage-shell">
    <section class="section-block search-panel" id="library" aria-labelledby="search-title">
      <div class="section-heading">
        <div>
          <p class="section-label">Search</p>
          <h2 id="search-title">搜尋單字頁</h2>
        </div>
        <span id="search-count">0 / 0</span>
      </div>

      <div class="search-line">
        <label class="search-field" for="word-search">
          <span>關鍵字</span>
          <input id="word-search" type="search" autocomplete="off" aria-describedby="search-help">
        </label>
        <label class="search-field compact-field" for="sort-words">
          <span>排序</span>
          <select id="sort-words">
            <option value="order">單字頁編號</option>
            <option value="az">A → Z</option>
            <option value="length">字母數少 → 多</option>
          </select>
        </label>
        <button class="control-button compact-button" type="button" id="clear-search" disabled>清除</button>
      </div>
      <p class="field-help" id="search-help">可搜尋單字、詞性、核心句與標籤；Enter 開啟目前選取結果，方向鍵切換結果。</p>

      <div class="result-list" id="word-results"></div>
    </section>
  </main>

  <script src="./word-index.js"></script>
  <script src="./manage-page.js"></script>
</body>
</html>
