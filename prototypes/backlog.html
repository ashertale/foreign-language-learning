<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>陌生字 | Daily English Vocabulary</title>
  <link rel="stylesheet" href="./manage-page.css">
</head>
<body class="manage-page">
  <nav class="topbar" aria-label="陌生字導覽">
    <div class="topbar-inner">
      <a class="brand" href="./index.html">Daily English Vocabulary</a>
      <div class="topbar-links">
        <a href="./index.html">單字庫</a>
        <a href="./backlog.html" aria-current="page">陌生字</a>
        <a href="./review.html">複習</a>
      </div>
    </div>
  </nav>

  <header class="page-head compact-head">
    <div class="page-head-inner single-column">
      <section>
        <p class="kicker">Word Inbox</p>
        <h1>陌生字</h1>
        <p class="page-thesis">記下陌生字，之後再生成深讀頁。</p>
      </section>
    </div>
  </header>

  <main class="manage-shell">
    <section class="section-block" aria-labelledby="capture-title">
      <div class="section-heading">
        <div>
          <p class="section-label">Capture</p>
          <h2 id="capture-title">新增陌生字</h2>
        </div>
      </div>

      <form class="capture-form" id="backlog-form">
        <label class="search-field" for="backlog-word">
          <span>單字</span>
          <input id="backlog-word" type="text" autocomplete="off" required>
        </label>
        <label class="search-field" for="backlog-note">
          <span>備註</span>
          <input id="backlog-note" type="text" autocomplete="off">
        </label>
        <button class="control-button primary compact-submit" type="submit">記錄</button>
      </form>
      <p class="field-help form-status" id="backlog-status" aria-live="polite"></p>
    </section>

    <section class="section-block" aria-labelledby="backlog-title">
      <div class="section-heading">
        <div>
          <p class="section-label">Table</p>
          <h2 id="backlog-title">待補清單</h2>
        </div>
        <span id="backlog-summary">0 words</span>
      </div>

      <div class="table-wrap">
        <table class="backlog-table">
          <thead>
            <tr>
              <th>單字</th>
              <th>備註</th>
              <th>狀態</th>
              <th>記錄時間</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="backlog-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./word-index.js"></script>
  <script src="./backlog-page.js"></script>
</body>
</html>
